{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h2>NetGuard</h2>
            <p class="text-muted">Network Monitoring Tool — IDS + IPS</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Username" required autofocus>
                <label for="username"><i class="bi bi-person"></i> Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Password" required>
                <label for="password"><i class="bi bi-lock"></i> Password</label>
            </div>

            <button type="submit" class="btn btn-primary btn-glow w-100 py-2" id="loginBtn">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="auth-link">Create Account</a>
            </p>
        </div>
    </div>

    <!-- Animated background -->
    <div class="auth-bg-effects">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
    </div>
</div>
{% endblock %}
