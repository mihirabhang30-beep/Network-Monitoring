{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-shield-plus"></i>
            </div>
            <h2>Create Account</h2>
            <p class="text-muted">Join NetGuard — Network Monitor</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Username" required autofocus minlength="3">
                <label for="username"><i class="bi bi-person"></i> Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="Email" required>
                <label for="email"><i class="bi bi-envelope"></i> Email</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Password" required minlength="6">
                <label for="password"><i class="bi bi-lock"></i> Password</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="confirmPassword" name="confirm_password"
                       placeholder="Confirm Password" required>
                <label for="confirmPassword"><i class="bi bi-lock-fill"></i> Confirm Password</label>
            </div>

            <button type="submit" class="btn btn-primary btn-glow w-100 py-2" id="registerBtn">
                <i class="bi bi-person-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account?
                <a href="{{ url_for('auth.login') }}" class="auth-link">Sign In</a>
            </p>
        </div>
    </div>

    <div class="auth-bg-effects">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
    </div>
</div>
{% endblock %}
